Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref YokaiUserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref YokaiUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${YokaiApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  FrontendUrl:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${FrontendDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-FrontendUrl'

  FrontendBucketName:
    Description: S3 bucket name for frontend assets
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${AWS::StackName}-FrontendBucket'

  FrontendDistributionId:
    Description: CloudFront distribution ID for frontend
    Value: !Ref FrontendDistribution
    Export:
      Name: !Sub '${AWS::StackName}-FrontendDistributionId'

  ImagesDistributionId:
    Description: CloudFront distribution ID for images
    Value: !Ref ImagesDistribution
    Export:
      Name: !Sub '${AWS::StackName}-ImagesDistributionId'
