AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Youkai Collection Web

Parameters:
  AdminKey:
    Type: String
    Default: change-me-before-deploy
    Description: Secret key for CMS admin API (X-Admin-Key header)
  SystemKey:
    Type: String
    Default: change-me-before-deploy
    Description: Secret key for system (Claude routine) API (X-System-Key header)

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        YOUKAI_TABLE: kodama_db
        CAPTURES_TABLE: !Ref CapturesTable
        IMAGES_BASE_URL: !Sub 'https://${ImagesDistribution.DomainName}'
        ADMIN_KEY: !Ref AdminKey
        SYSTEM_KEY: !Ref SystemKey
        RESEARCH_TABLE: !Ref YoukaiResearchTable
        CORE_TABLE: !Ref YoukaiCoreTable
        IMAGES_BUCKET: youkai-collection-images
        PLAYER_PROFILE_TABLE: !Ref PlayerProfileTable
        ARAGAMI_TABLE: !Ref AragamiTable
        FLYING_SHIKIGAMI_TABLE: !Ref FlyingShikigamiTable
        KEKKAI_STONES_TABLE:    !Ref KekkaiStonesTable
        KEKKAI_BARRIERS_TABLE:  !Ref KekkaiBarriersTable
        YAMABUSHI_STONES_TABLE: !Ref YamabushiStonesTable

Resources:
  # API Gateway
  YokaiApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Admin-Key,X-System-Key,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt YokaiUserPool.Arn
            Identity:
              Header: Authorization

  # Cognito User Pool
  YokaiUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-users'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  YokaiUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${AWS::StackName}-web-client'
      UserPoolId: !Ref YokaiUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  YokaiPremiumGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: premium
      UserPoolId: !Ref YokaiUserPool
      Description: Premium subscribers with academic mode access

  # Research Table (youkai_research)
  YoukaiResearchTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai_research
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: research_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: collected_at
          AttributeType: S
        - AttributeName: collector_id
          AttributeType: S
      KeySchema:
        - AttributeName: research_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-collected_at-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: collected_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: collector_id-collected_at-index
          KeySchema:
            - AttributeName: collector_id
              KeyType: HASH
            - AttributeName: collected_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # Core Table (youkai_core) — 配信用確定データ、kodama_db の後継
  YoukaiCoreTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai_core
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: yokai_id
          AttributeType: S
        - AttributeName: published
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: yokai_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: published-updated_at-index
          KeySchema:
            - AttributeName: published
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # FlyingShikigami Table (陰陽師: 飛翔式神)
  FlyingShikigamiTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai-flying-shikigami
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: shikigami_id
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
        - AttributeName: shikigami_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # KekkaiStones Table (陰陽師: 結界術 — 設置中の石)
  KekkaiStonesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai-kekkai-stones
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: stone_id
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
        - AttributeName: stone_id
          KeyType: RANGE

  # KekkaiBarriers Table (陰陽師: 結界術 — 成立した結界)
  KekkaiBarriersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai-kekkai-barriers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: barrier_id
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
        - AttributeName: barrier_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Captures Table (new)
  CapturesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai-captures
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: youkaiId
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
        - AttributeName: youkaiId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: youkaiId-index
          KeySchema:
            - AttributeName: youkaiId
              KeyType: HASH
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - actionType

  # Aragami Table (呪術師 魂振)
  AragamiTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai-aragami
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: youkaiId
          AttributeType: S
      KeySchema:
        - AttributeName: youkaiId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # YamabushiStones Table (山伏: 石積み)
  YamabushiStonesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai-yamabushi-stones
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
        - AttributeName: stone_id
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH
        - AttributeName: stone_id
          KeyType: RANGE

  # Player Profile Table
  PlayerProfileTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: youkai-player-profile
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deviceId
          AttributeType: S
      KeySchema:
        - AttributeName: deviceId
          KeyType: HASH

  # Lambda: GET /youkai
  ListYokaiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - src/handlers/listYoukai.ts
    Properties:
      CodeUri: ../backend/
      Handler: src/handlers/listYoukai.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kodama_db'
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref YokaiApi
            Path: /youkai
            Method: GET

  # Lambda: GET /youkai/{id}
  GetYokaiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - src/handlers/getYoukai.ts
    Properties:
      CodeUri: ../backend/
      Handler: src/handlers/getYoukai.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kodama_db'
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref YokaiApi
            Path: /youkai/{id}
            Method: GET

  # Lambda: POST /capture
  CaptureYokaiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: false
        EntryPoints:
          - src/handlers/captureYoukai.ts
    Properties:
      CodeUri: ../backend/
      Handler: src/handlers/captureYoukai.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/kodama_db'
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt CapturesTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt PlayerProfileTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt KekkaiBarriersTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt AragamiTable.Arn
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref YokaiApi
            Path: /capture
            Method: POST

